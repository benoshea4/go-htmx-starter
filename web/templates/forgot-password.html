{{ define "content" }}
    <div class="bg-white rounded-lg shadow-sm p-8 w-full max-w-sm">
        <h1 class="text-2xl font-bold mb-2 text-gray-800">Reset password</h1>
        <p class="text-sm text-gray-500 mb-6">Enter your email and we'll send a reset link.</p>

        <div id="error" class="text-red-600 text-sm mb-4 empty:hidden bg-red-50 p-3 rounded border border-red-200"></div>
        <div id="success" class="text-green-700 text-sm mb-4 empty:hidden bg-green-50 p-3 rounded border border-green-200"></div>

        <form hx-post="/forgot-password"
              hx-target="#success"
              hx-swap="innerHTML"
              class="flex flex-col gap-4">

            <input type="email"
                   name="email"
                   required
                   placeholder="Email"
                   class="border p-2 rounded focus:outline-hidden focus:ring-2 focus:ring-blue-400">

            <button type="submit"
                    class="bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">
                Send reset link
            </button>
        </form>

        <p class="mt-4 text-sm text-gray-500">
            <a href="/login" class="hover:text-blue-600">Back to sign in</a>
        </p>
    </div>
{{ end }}
