# HAProxy routes the app's localhost:5432 connection to whichever node Patroni
# has elected as primary. It polls Patroni's REST API (/primary returns 200 on
# the leader, 503 on replicas) to make the routing decision.
#
# Deploy this to /etc/haproxy/haproxy.cfg on all 3 nodes — no per-node changes.
# Private IPs: node1=10.0.0.2, node2=10.0.0.3, node3=10.0.0.4

global
    maxconn 100
    log /dev/log local0

defaults
    log global
    mode tcp
    retries 2
    timeout client  30m
    timeout connect 4s
    timeout server  30m
    timeout check   5s

# Stats page — local only, for debugging
listen stats
    mode http
    bind 127.0.0.1:7000
    stats enable
    stats uri /
    stats refresh 10s

# Write traffic — routes to the Patroni primary only.
# Replicas return 503 on GET /primary so HAProxy marks them DOWN for this backend.
listen postgres
    bind 127.0.0.1:5432
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server node1 10.0.0.2:5432 maxconn 100 check port 8008
    server node2 10.0.0.3:5432 maxconn 100 check port 8008
    server node3 10.0.0.4:5432 maxconn 100 check port 8008
